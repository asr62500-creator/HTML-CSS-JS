<!DOCTYPE html>
<html>
<head>
    <style>
        p{
        border: 10px solid red;   /* creates border around paragraph */
        margin: 30px;            /* space outside the border */
        padding: 20px;           /* space inside the border */
    }
       p{
        font-weight: bold;
        font-family:Arial, sans-serif, Helvetica;
        }
    </style>
</head>
<body>
    <h2>Example for Border, Margin, and Padding</h2>
    <p>This paragraph demonstrates border, margin, and padding properties.
    </p>
</body>
</html>
