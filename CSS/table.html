<!-- Table using CSS -->
<!DOCTYPE html>
<html>      
<head>
<title>CSS Table Example</title>    
<style>
table {
  border-collapse: collapse; /* Collapses borders into a single line */
  width: 50%;
}

th, td {
  border: 1px solid black; /* Adds a border to table cells */
  padding: 10px; /* Adds padding inside cells */
  text-align: center; /* Aligns text to the center */
}
th {
  background-color: lightblue; /* Sets background color for header cells */
}
</style>
</head>
<body>  
<h2>CSS Table Example</h2>
<table> 
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Age</th>
    </tr>
    <tr>
        <td>Amit</td>
        <td>Computer Science</td>
        <td>22</td>
    </tr>
    <tr>
        <td>Suman</td>
        <td>Mathematics</td>
        <td>23</td>
    </tr>
    
</table>
</body> 
</html>
