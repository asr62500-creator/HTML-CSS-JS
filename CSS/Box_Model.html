<!DOCTYPE html>
<html>
<head>
    <style>
        .box{
            width:200px;               /* Content width */
            padding:20px;              /* Space inside border */
            border:5px solid black;    /* Border around element */
            margin:30px;               /* Space outside element */
            background-color:lightblue;
        }
    </style>
</head>
<body>
    <div class="box">
        a). This is an example of the CSS Box Model.
    </div>
    <div class="box">
        b). This is another example of the CSS Box Model.
    </div>
</body>
</html>
